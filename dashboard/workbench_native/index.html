<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hermes Native Preview Workbench</title>
  <link rel="stylesheet" href="/workbench/workbench.css" />
</head>
<body>
  <header class="wb-header">
    <div class="wb-title">
      <strong>Hermes Native Preview Workbench</strong>
      <span class="wb-sub">Remotion-like preview &middot; Hermes-native &middot; no Remotion runtime</span>
    </div>
    <div class="wb-badges">
      <span class="badge badge-warn">interactive proposal</span>
      <span class="badge">canonical render = ffmpeg BUILD</span>
    </div>
  </header>

  <main class="wb-main">
    <section class="wb-stage">
      <div class="wb-monitor" id="monitor">
        <img id="stage-image" alt="" hidden />
        <video id="stage-video" hidden playsinline muted></video>
        <div id="stage-empty" class="stage-empty">No active clip</div>
        <div id="subtitle-overlay" class="subtitle-overlay"></div>
        <div id="stage-meta" class="stage-meta"></div>
      </div>

      <div class="wb-transport">
        <button id="btn-play">▶ Play</button>
        <button id="btn-pause" hidden>⏸ Pause</button>
        <button id="btn-rewind">⏮</button>
        <input id="scrubber" type="range" min="0" max="0" step="0.01" value="0" />
        <span id="time-label" class="time-label">0.00 / 0.00s</span>
        <span id="frame-label" class="frame-label">f0</span>
      </div>
    </section>

    <section class="wb-inspector" id="inspector">
      <h2>Inspector</h2>
      <div id="inspector-empty" class="muted">Select a clip on the timeline.</div>
      <div id="inspector-body" hidden>
        <dl class="meta-grid" id="inspector-meta"></dl>
        <div class="field">
          <label>duration_sec</label>
          <input id="in-duration" type="number" step="0.1" min="0.1" />
        </div>
        <div class="field" id="field-source-start">
          <label>source_start_sec</label>
          <input id="in-source-start" type="number" step="0.1" min="0" />
        </div>
        <div class="field" id="field-source-duration">
          <label>source_duration_sec</label>
          <input id="in-source-duration" type="number" step="0.1" min="0.1" />
        </div>
        <div class="field-row">
          <button id="btn-apply-clip">Apply</button>
          <button id="btn-move-left">◀ Move left</button>
          <button id="btn-move-right">Move right ▶</button>
        </div>
      </div>
    </section>
  </main>

  <section class="wb-timeline">
    <div class="track">
      <span class="track-label">video</span>
      <div class="track-lane" id="lane-video"></div>
    </div>
    <div class="track">
      <span class="track-label">subtitle</span>
      <div class="track-lane" id="lane-subtitle"></div>
    </div>
    <div class="track">
      <span class="track-label">audio</span>
      <div class="track-lane" id="lane-audio"></div>
    </div>
    <div class="track">
      <span class="track-label">effect</span>
      <div class="track-lane" id="lane-effect"></div>
    </div>
    <div class="playhead" id="playhead"></div>
  </section>

  <footer class="wb-footer">
    <div id="diagnostics" class="diagnostics"></div>
    <div class="footer-actions">
      <span id="dirty-flag" class="muted">no local edits</span>
      <button id="btn-download-patch">Download patch</button>
      <button id="btn-save-patch">Save patch &rarr; server</button>
    </div>
  </footer>

  <script src="/workbench/workbench_core.js"></script>
  <script src="/workbench/workbench.js"></script>
</body>
</html>
