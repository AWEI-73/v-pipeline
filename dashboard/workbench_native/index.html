<!DOCTYPE html>
<html lang="zh-Hant" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hermes 影片剪輯工作檯</title>
  <link rel="stylesheet" href="/workbench/workbench.css" />
</head>
<body>
  <header class="wb-header">
    <div class="header-left">
      <div class="wb-title">
        <strong>Hermes 影片剪輯工作檯</strong>
        <span class="wb-sub">素材替換 / 段落微調 / ffmpeg 草稿輸出</span>
      </div>
      <div class="undo-redo" aria-label="復原與重做">
        <button class="btn-icon" id="btn-undo" title="復原" type="button" disabled>
          <svg viewBox="0 0 24 24" width="16" height="16"><path d="M12.5 8c-2.65 0-5.05.99-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z" fill="currentColor"/></svg>
        </button>
        <button class="btn-icon" id="btn-redo" title="重做" type="button" disabled>
          <svg viewBox="0 0 24 24" width="16" height="16"><path d="M18.4 10.6C16.55 8.99 14.15 8 11.5 8c-4.65 0-8.58 3.03-9.96 7.22L3.9 16c1.05-3.19 4.05-5.5 7.6-5.5 1.95 0 3.73.72 5.12 1.88L13 16h9V7l-3.6 3.6z" fill="currentColor"/></svg>
        </button>
      </div>
    </div>

    <div class="header-mid">
      <select id="aspect-ratio" class="aspect-ratio-select" title="畫面比例">
        <option value="16:9">16:9 橫式</option>
        <option value="9:16">9:16 直式</option>
        <option value="1:1">1:1 方形</option>
      </select>
    </div>

    <div class="wb-badges" style="align-items: center;">
      <!-- Four domain contract buttons -->
      <button class="dico" id="dico-material" data-domain="material" title="素材契約" type="button" style="margin-right: 4px;">
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M21 19V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2zM8.5 13.5l2.5 3 3.5-4.5 4.5 6H5l3.5-4.5z" fill="currentColor"/></svg>
        <span class="dot dot-off" id="dot-material"></span>
      </button>
      <button class="dico" id="dico-music" data-domain="music" title="音樂契約" type="button" style="margin-right: 4px;">
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z" fill="currentColor"/></svg>
        <span class="dot dot-off" id="dot-music"></span>
      </button>
      <button class="dico" id="dico-subtitle" data-domain="subtitle" title="字幕口白契約" type="button" style="margin-right: 4px;">
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M12 1a4 4 0 0 0-4 4v6a4 4 0 0 0 8 0V5a4 4 0 0 0-4-4zm7 10a7 7 0 0 1-14 0H3a9 9 0 0 0 8 8.94V23h2v-3.06A9 9 0 0 0 21 11h-2z" fill="currentColor"/></svg>
        <span class="dot dot-off" id="dot-subtitle"></span>
      </button>
      <button class="dico" id="dico-effect" data-domain="effect" title="特效契約" type="button" style="margin-right: 12px;">
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M12 2l1.8 5.6L19 9l-5.2 1.4L12 16l-1.8-5.6L5 9l5.2-1.4L12 2zm7 12l.9 2.8L23 18l-3.1 1.2L19 22l-.9-2.8L15 18l3.1-1.2L19 14z" fill="currentColor"/></svg>
        <span class="dot dot-off" id="dot-effect"></span>
      </button>
      <span class="badge badge-warn">草稿編輯</span>
      <span class="badge">正式輸出 = ffmpeg BUILD</span>
    </div>
  </header>

  <main class="wb-main-container">
    <nav class="tab-bar" aria-label="工作檯工具">
      <button class="tab-item active" type="button" data-drawer="drawer-media">
        <svg viewBox="0 0 24 24" width="20" height="20"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H8V4h12v12z" fill="currentColor"/></svg>
        <span>素材</span>
      </button>
      <button class="tab-item" type="button" data-drawer="drawer-media" title="字幕軌可在下方時間軸選取後編輯" disabled aria-disabled="true">
        <svg viewBox="0 0 24 24" width="20" height="20"><path d="M5 4v3h5.5v12h3V7H19V4H5z" fill="currentColor"/></svg>
        <span>字幕</span>
      </button>
      <button class="tab-item" type="button" data-drawer="drawer-media" title="音訊軌可在下方時間軸選取後編輯" disabled aria-disabled="true">
        <svg viewBox="0 0 24 24" width="20" height="20"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z" fill="currentColor"/></svg>
        <span>音訊</span>
      </button>
    </nav>

    <div class="wb-content-layout">
      <aside class="wb-materials" id="drawer-media">
        <div class="materials-head">
          <h2>可用素材</h2>
          <button id="btn-drawer" title="收合/展開素材區" type="button" style="padding: 2px 6px; cursor: pointer; border: 1px solid var(--line2); border-radius: 4px; background: none; color: inherit; display: flex; align-items: center; justify-content: center;">
            <svg viewBox="0 0 24 24" width="14" height="14" style="display: block;"><path d="M15.4 7.4 14 6l-6 6 6 6 1.4-1.4L10.8 12l4.6-4.6z" fill="currentColor"/></svg>
          </button>
          <span id="material-map-summary" class="muted">載入中...</span>
        </div>
        <div class="search-box">
          <input id="asset-search" class="asset-search" type="search" placeholder="搜尋素材 / 分類 / 需求" />
        </div>
        <select id="asset-family-filter" class="asset-family-filter">
          <option value="">全部分類</option>
        </select>
        <label style="font-size:12px;color:var(--muted);display:flex;align-items:center;gap:5px;margin-bottom:12px;cursor:pointer;"><input type="checkbox" checked id="fit-only" style="margin:0;">只看符合契約的素材</label>
        <div id="material-assets-list" class="material-assets-list"></div>
      </aside>

      <section class="wb-stage">
        <div class="wb-monitor-container">
          <div class="wb-monitor" id="monitor">
            <img id="stage-image" alt="" hidden />
            <video id="stage-video" hidden playsinline muted></video>
            <audio id="preview-audio" preload="metadata"></audio>
            <div id="stage-empty" class="stage-empty">尚未載入可預覽片段</div>
            <div id="effect-overlay" class="effect-overlay" hidden></div>
            <div id="effect-label" class="effect-label" hidden></div>
            <div id="subtitle-overlay" class="subtitle-overlay"></div>
            <div id="stage-meta" class="stage-meta"></div>
          </div>
        </div>

        <div class="wb-transport">
          <button id="btn-play" type="button">播放</button>
          <button id="btn-pause" type="button" hidden>暫停</button>
          <button id="btn-rewind" type="button">回到開頭</button>
          <input id="scrubber" type="range" min="0" max="0" step="0.01" value="0" />
          <span id="time-label" class="time-label">0.00 / 0.00s</span>
          <span id="frame-label" class="frame-label">f0</span>
          <span id="audio-status" class="audio-status">音訊：未載入</span>
        </div>
      </section>

      <section class="wb-inspector" id="inspector">
        <h2>鏡頭契約</h2>
        <div id="inspector-empty" class="muted">請選取影片軌上的片段，查看素材、時長與來源範圍。</div>
        <div id="inspector-body" hidden>
          <dl class="meta-grid" id="inspector-meta"></dl>
          <div class="field">
            <label>duration_sec</label>
            <input id="in-duration" type="number" step="0.1" min="0.1" />
          </div>
          <div class="field" id="field-source-start">
            <label>source_start_sec</label>
            <input id="in-source-start" type="number" step="0.1" min="0" />
          </div>
          <div class="field" id="field-source-duration">
            <label>source_duration_sec</label>
            <input id="in-source-duration" type="number" step="0.1" min="0.1" />
          </div>
          <div class="field-row">
            <button id="btn-apply-clip" type="button">套用</button>
            <button id="btn-replace-clip" type="button" title="用左側選取素材替換目前片段，只會儲存為 timeline_patch 草稿。">以選取素材替換</button>
            <button id="btn-move-left" type="button">左移</button>
            <button id="btn-move-right" type="button">右移</button>
          </div>
        </div>

        <div id="track-inspector" hidden>
          <h2 id="track-insp-title">軌道項目</h2>
          <div class="field" id="tf-text"><label>text</label><input id="t-text" type="text" /></div>
          <div class="field" id="tf-preset"><label>preset</label><select id="t-preset"></select></div>
          <div class="field" id="tf-cuetype"><label>cue_type</label><select id="t-cuetype"></select></div>
          <div class="field" id="tf-start"><label>start_sec</label><input id="t-start" type="number" step="0.1" min="0" /></div>
          <div class="field" id="tf-duration"><label>duration_sec</label><input id="t-duration" type="number" step="0.1" min="0.1" /></div>
          <div class="field" id="tf-time"><label>time_sec</label><input id="t-time" type="number" step="0.1" min="0" /></div>
          <div class="field" id="tf-strength"><label>強度 1-5</label><input id="t-strength" type="number" step="1" min="1" max="5" /></div>
          <div class="field-row">
            <button id="btn-apply-track" type="button">套用</button>
            <button id="btn-delete-track" type="button">刪除</button>
          </div>
        </div>
        <div id="domain-inspector" hidden></div>
      </section>
    </div>
  </main>

  <div class="track-tools">
    <button id="btn-add-cue" type="button" title="在目前播放時間新增音效提示。">+ 音效提示 @ 播放點</button>
    <select id="effect-asset-select" title="選擇素材地圖中的特效素材">
      <option value="">選擇特效素材</option>
    </select>
    <button id="btn-add-fx" type="button" title="在目前播放片段新增特效意圖。">+ 特效意圖到片段</button>
    <span class="track-hint">BGM、字幕、音效與特效會寫成草稿 patch，正式出片仍由後段 BUILD 驗證。</span>
  </div>

  <section class="wb-timeline">
    <div class="timeline-scroll" id="timeline-scroll">
      <div class="timeline-canvas" id="timeline-canvas">
        <div class="timeline-ruler" id="timeline-ruler"></div>
        <div class="track">
          <span class="track-label">影片</span>
          <div class="track-lane" id="lane-video"></div>
        </div>
        <div class="track">
          <span class="track-label">字幕</span>
          <div class="track-lane" id="lane-subtitle"></div>
        </div>
        <div class="track">
          <span class="track-label">音訊</span>
          <div class="track-lane" id="lane-audio"></div>
        </div>
        <div class="track">
          <span class="track-label">特效</span>
          <div class="track-lane" id="lane-effect"></div>
        </div>
        <div class="playhead" id="playhead"></div>
      </div>
    </div>
  </section>

  <footer class="wb-footer">
    <div id="diagnostics" class="diagnostics"></div>
    <div class="footer-actions">
      <span id="dirty-flag" class="muted">尚未儲存草稿</span>
      <button id="btn-download-patch" type="button">下載 patch</button>
      <button id="btn-save-patch" type="button">儲存 patch 到資料夾</button>
      <button id="btn-sync-contract" type="button" title="把時間軸 patch 轉成草稿合約，仍需後續 gate 驗證。">同步草稿合約</button>
      <button id="btn-save-all" type="button" title="一次儲存時間軸、字幕、音訊與特效 patch，並產生 workbench_handoff.json。">儲存全部並交接</button>
      <button id="btn-export" type="button" title="可選：輸出 workbench_export.mp4，不會覆蓋 final.mp4。">輸出 ffmpeg 草稿</button>
    </div>
  </footer>

  <script src="/workbench/workbench_core.js"></script>
  <script src="/workbench/workbench_api.js"></script>
  <script src="/workbench/workbench_materials.js"></script>
  <script src="/workbench/workbench.js"></script>
</body>
</html>
