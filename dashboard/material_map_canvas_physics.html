<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hermes Organic Flow Canvas</title>
    <!-- Import Google Fonts & Tabler Icons -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;600;700;800&display=swap">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    
    <style>
        :root {
            --bg-app: #f8fafc;
            --bg-surface: rgba(255, 255, 255, 0.85);
            --border-color: rgba(226, 232, 240, 0.8);
            --text-title: #0f172a;
            --text-body: #334155;
            --text-muted: #64748b;
            --primary: #6366f1;
            --primary-soft: rgba(99, 102, 241, 0.1);
            --accent: #0ea5e9;
            --success: #10b981;
            --r-lg: 16px;
            --r-md: 10px;
            --shadow-md: 0 12px 30px -10px rgba(0,0,0,0.06);
            --font-sans: "Inter", "Noto Sans TC", system-ui, sans-serif;
            --font-display: "Outfit", var(--font-sans);
        }

        body.dark-theme {
            --bg-app: #0f172a;
            --bg-surface: rgba(30, 41, 59, 0.85);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-title: #f8fafc;
            --text-body: #cbd5e1;
            --text-muted: #94a3b8;
            --primary: #818cf8;
            --primary-soft: rgba(129, 140, 248, 0.15);
            --shadow-md: 0 12px 30px -10px rgba(0, 0, 0, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background-color: var(--bg-app);
            color: var(--text-body);
            font-family: var(--font-sans);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: background-color 0.3s ease;
        }

        #canvas-container {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* UI Overlays */
        .ui-overlay {
            position: absolute;
            z-index: 10;
            pointer-events: none;
        }

        .ui-overlay a, 
        .ui-overlay button, 
        .ui-overlay select,
        .ui-overlay input {
            pointer-events: auto;
        }

        /* Header UI */
        header.top-header {
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand-card {
            background: var(--bg-surface);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: var(--r-lg);
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            box-shadow: var(--shadow-md);
        }

        .logo-box {
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            border-radius: var(--r-md);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            box-shadow: 0 4px 10px rgba(99, 102, 241, 0.25);
        }

        .brand-info h1 {
            font-family: var(--font-display);
            font-size: 16px;
            font-weight: 800;
            color: var(--text-title);
            letter-spacing: -0.01em;
        }

        .brand-info p {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 500;
            margin-top: 1px;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .glass-btn {
            background: var(--bg-surface);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: var(--r-md);
            padding: 10px 16px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-title);
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            box-shadow: var(--shadow-md);
            transition: all 0.2s;
        }

        .glass-btn:hover {
            transform: translateY(-1px);
            border-color: var(--primary);
        }

        /* Left Sidebar */
        .sidebar-left {
            left: 20px;
            top: 100px;
            bottom: 20px;
            width: 280px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .glass-card {
            background: var(--bg-surface);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: var(--r-lg);
            padding: 18px;
            box-shadow: var(--shadow-md);
            display: flex;
            flex-direction: column;
        }

        .card-title {
            font-family: var(--font-display);
            font-size: 14px;
            font-weight: 700;
            color: var(--text-title);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .stat-box {
            background: rgba(0, 0, 0, 0.02);
            border: 1px solid var(--border-color);
            border-radius: var(--r-md);
            padding: 10px;
            text-align: center;
        }

        body.dark-theme .stat-box {
            background: rgba(255, 255, 255, 0.02);
        }

        .stat-val {
            font-family: var(--font-display);
            font-size: 18px;
            font-weight: 800;
            color: var(--primary);
        }

        .stat-lbl {
            font-size: 10px;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            margin-top: 2px;
        }

        /* Right Sidebar (Details Inspector) */
        .sidebar-right {
            right: 20px;
            top: 20px;
            bottom: 20px;
            width: 320px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .details-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 14px;
            overflow-y: auto;
            margin-top: 6px;
        }

        .detail-item-group {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 12px;
        }

        .detail-lbl {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .detail-val {
            font-size: 13.5px;
            color: var(--text-title);
            font-weight: 500;
        }

        .pill-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 99px;
            font-size: 11.5px;
            font-weight: 700;
            background: var(--primary-soft);
            color: var(--primary);
        }

        /* Instruction Bar */
        .controls-instruction {
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(8px);
            padding: 8px 18px;
            border-radius: 99px;
            color: white;
            font-size: 11.5px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: var(--shadow-md);
        }
    </style>
</head>
<body>

    <!-- 2D Canvas Container -->
    <div id="canvas-container">
        <canvas id="physics-canvas"></canvas>
    </div>

    <!-- UI Overlay Elements -->
    
    <!-- Header -->
    <header class="ui-overlay top-header">
        <div class="brand-card">
            <div class="logo-box"><i class="ti ti-activity"></i></div>
            <div class="brand-info">
                <h1>Hermes Organic Flow Canvas</h1>
                <p>力導向素材流向畫布 (Physics Spring Simulation)</p>
            </div>
        </div>

        <div class="header-controls">
            <!-- Project Selector -->
            <div class="brand-card" style="padding: 10px 16px;">
                <i class="ti ti-folder-open" style="color:var(--primary); font-size:18px;"></i>
                <select id="project-physics-select" style="background: transparent; border: none; font-size: 13px; font-weight: 700; color: var(--text-title); cursor: pointer; outline: none; margin-left:6px; font-family: var(--font-sans);">
                    <option value="srp_real67_fuller_replay">67 期成果回顧</option>
                    <option value="cinderella_storybook_e2e">灰姑娘故事繪本</option>
                    <option value="comic_5min_material_plan">五分鐘漫畫管線</option>
                </select>
            </div>
            
            <button class="glass-btn" id="btn-stabilize-graph">
                <i class="ti ti-refresh"></i>
                <span>重置排布</span>
            </button>
            <button class="glass-btn" id="theme-toggler">🌙</button>
        </div>
    </header>

    <!-- Sidebar Left -->
    <div class="ui-overlay sidebar-left">
        <div class="glass-card">
            <div class="card-title"><i class="ti ti-chart-bar" style="color:var(--primary)"></i> 管線資源狀態</div>
            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-val" id="val-raw-assets">12</div>
                    <div class="stat-lbl">原始素材</div>
                </div>
                <div class="stat-box">
                    <div class="stat-val" id="val-needs">8</div>
                    <div class="stat-lbl">影片需求</div>
                </div>
                <div class="stat-box">
                    <div class="stat-val" id="val-mapped" style="color:var(--success)">8</div>
                    <div class="stat-lbl">成功覆蓋</div>
                </div>
                <div class="stat-box">
                    <div class="stat-val" id="val-issues" style="color:red">1</div>
                    <div class="stat-lbl">偏薄/空缺</div>
                </div>
            </div>
        </div>

        <div class="glass-card" style="flex:1;">
            <div class="card-title"><i class="ti ti-adjustments" style="color:var(--primary)"></i> 物理引擎參數</div>
            
            <div style="display:flex; flex-direction:column; gap:12px; margin-top:6px;">
                <label style="display:flex; align-items:center; gap:8px; font-size:12.5px; cursor:pointer;">
                    <input type="checkbox" id="chk-repulsion" checked style="accent-color: var(--primary);">
                    <span>節點互斥力 (Node Repulsion)</span>
                </label>
                <label style="display:flex; align-items:center; gap:8px; font-size:12.5px; cursor:pointer;">
                    <input type="checkbox" id="chk-gravity" checked style="accent-color: var(--primary);">
                    <span>向心力引力 (Center Gravity)</span>
                </label>
                <label style="display:flex; align-items:center; gap:8px; font-size:12.5px; cursor:pointer;">
                    <input type="checkbox" id="chk-particles" checked style="accent-color: var(--primary);">
                    <span>線路流動粒子 (Flow Particles)</span>
                </label>
            </div>
            
            <div style="margin-top:auto; font-size:11px; color:var(--text-muted); line-height:1.5;">
                <i class="ti ti-info-circle"></i> <b>物理互動：</b>您可以點選任何節點並拖曳，它會牽引所有與之相連的相鄰節點，放開後會受彈性阻尼影響自然彈回。
            </div>
        </div>
    </div>

    <!-- Sidebar Right -->
    <div class="ui-overlay sidebar-right">
        <div class="glass-card" style="flex: 1;">
            <div class="card-title" id="inspector-title">
                <i class="ti ti-input-search" style="color:var(--primary)"></i>
                <span>節點檢視器 (Inspector)</span>
            </div>
            
            <div class="details-body" id="inspector-details">
                <div style="text-align:center; padding:40px 20px; color:var(--text-muted); font-size:12.5px;">
                    <i class="ti ti-hand-click" style="font-size:24px; color:var(--primary); margin-bottom:8px; display:block;"></i>
                    點擊或拖曳任何一個節點<br>查看素材映射詳情與對齊狀態
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Instruction Bar -->
    <div class="ui-overlay controls-instruction">
        <span><i class="ti ti-mouse"></i> 左鍵拖曳拉動節點</span>
        <span><i class="ti ti-hand-grab"></i> 點選彈力拉伸</span>
        <span><i class="ti ti-hand-click"></i> 單擊選取節點</span>
    </div>

    <script>
        // Mocks data matching the earlier ones
        const PROJECT_PHYSICS_MOCKS = {
            srp_real67_fuller_replay: {
                stats: { raw: 12, needs: 8, mapped: 8, issues: 1 },
                nodes: [
                    { id: "asset_01", label: "開場特寫 (01.mp4)", group: 0, details: { type: "video", path: "assets/01.mp4", duration: "12s" } },
                    { id: "asset_02", label: "課堂空鏡 (02.mp4)", group: 0, details: { type: "video", path: "assets/02.mp4", duration: "8.5s" } },
                    { id: "asset_03", label: "學員操作 (03.mp4)", group: 0, details: { type: "video", path: "assets/03.mp4", duration: "15s" } },
                    { id: "asset_04", label: "結訓感言 (04.mp4)", group: 0, details: { type: "video", path: "assets/04.mp4", duration: "24s" } },
                    { id: "bgm_main", label: "音樂: 紀念汗水 (bgm.mp3)", group: 0, details: { type: "audio", path: "assets/bgm.mp3", duration: "3m12s" } },
                    
                    { id: "need_01", label: "需求: 開場氛圍", group: 1, details: { description: "建立結訓儀式感與開場暖身", status: "covered" } },
                    { id: "need_02", label: "需求: 培訓剪影", group: 1, details: { description: "學員在課堂上專注的神情", status: "covered" } },
                    { id: "need_03", label: "需求: 實作演練", group: 1, details: { description: "學員親自動手操作設備", status: "covered" } },
                    { id: "need_04", label: "需求: 講師回饋", group: 1, details: { description: "講師鼓勵與點評", status: "thin", warning: "素材偏薄，僅有一段實拍備選" } },
                    
                    { id: "scene_01", label: "Storyboard: Scene 1", group: 2, details: { asset: "asset_01", target: "need_01", status: "accepted" } },
                    { id: "scene_02", label: "Storyboard: Scene 2", group: 2, details: { asset: "asset_02", target: "need_02", status: "accepted" } },
                    { id: "scene_03", label: "Storyboard: Scene 3", group: 2, details: { asset: "asset_03", target: "need_03", status: "accepted" } },
                    { id: "scene_04", label: "Storyboard: Scene 4", group: 2, details: { asset: "asset_04", target: "need_04", status: "reviewing" } },
                ],
                links: [
                    { source: "asset_01", target: "need_01" },
                    { source: "asset_02", target: "need_02" },
                    { source: "asset_03", target: "need_03" },
                    { source: "asset_04", target: "need_04" },
                    { source: "need_01", target: "scene_01" },
                    { source: "need_02", target: "scene_02" },
                    { source: "need_03", target: "scene_03" },
                    { source: "need_04", target: "scene_04" },
                ]
            },
            cinderella_storybook_e2e: {
                stats: { raw: 6, needs: 5, mapped: 5, issues: 0 },
                nodes: [
                    { id: "c_asset_01", label: "插畫: 城堡宴會", group: 0, details: { type: "image", path: "assets/castle.png", resolution: "2K" } },
                    { id: "c_asset_02", label: "插畫: 南瓜車", group: 0, details: { type: "image", path: "assets/fairy.png" } },
                    { id: "c_asset_03", label: "配音: 旁白第一幕", group: 0, details: { type: "audio", path: "assets/vo_1.mp3", duration: "45s" } },
                    
                    { id: "c_need_01", label: "故事需求: 變身啟程", group: 1, details: { description: "南瓜車變出且出發" } },
                    { id: "c_need_02", label: "故事需求: 宴會邂逅", group: 1, details: { description: "王子與辛德瑞拉跳舞" } },
                    
                    { id: "c_scene_01", label: "繪本畫面 1", group: 2, details: { asset: "c_asset_02", target: "c_need_01" } },
                    { id: "c_scene_02", label: "繪本畫面 2", group: 2, details: { asset: "c_asset_01", target: "c_need_02" } },
                ],
                links: [
                    { source: "c_asset_02", target: "c_need_01" },
                    { source: "c_asset_01", target: "c_need_02" },
                    { source: "c_need_01", target: "c_scene_01" },
                    { source: "c_need_02", target: "c_scene_02" },
                ]
            },
            comic_5min_material_plan: {
                stats: { raw: 15, needs: 12, mapped: 10, issues: 2 },
                nodes: [
                    { id: "m_asset_01", label: "分鏡 A1", group: 0, details: { type: "image", path: "manga_a1.png" } },
                    { id: "m_asset_02", label: "對話框配音 B1", group: 0, details: { type: "audio", path: "voice_b1.mp3" } },
                    { id: "m_need_01", label: "需求: 第一格展示", group: 1, details: { description: "對齊圖像與音軌" } },
                    { id: "m_scene_01", label: "影格分鏡 1", group: 2, details: { asset: "m_asset_01", target: "m_need_01" } },
                ],
                links: [
                    { source: "m_asset_01", target: "m_need_01" },
                    { source: "m_need_01", target: "m_scene_01" },
                ]
            }
        };

        // Physics Simulation parameters
        const kRepulsion = 150;     // Repulsion between nodes
        const kSpring = 0.04;       // Spring stiffness
        const kRestingLength = 140; // Spring resting length
        const kGravity = 0.02;      // Gravity to center
        const kDamping = 0.88;      // Friction/Damping

        const canvas = document.getElementById("physics-canvas");
        const ctx = canvas.getContext("2d");
        
        let nodes = [];
        let links = [];
        let particles = [];
        let activeProject = "srp_real67_fuller_replay";
        let isDarkTheme = false;
        
        let draggedNode = null;
        let selectedNode = null;
        let hoveredNode = null;
        let mouseX = 0, mouseY = 0;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener("resize", resize);
        resize();

        // Load project data and instantiate Node objects
        function loadProject(projKey) {
            const data = PROJECT_PHYSICS_MOCKS[projKey];
            if (!data) return;

            document.getElementById("val-raw-assets").textContent = data.stats.raw;
            document.getElementById("val-needs").textContent = data.stats.needs;
            document.getElementById("val-mapped").textContent = data.stats.mapped;
            document.getElementById("val-issues").textContent = data.stats.issues;

            // Instantiate nodes
            nodes = data.nodes.map((n, idx) => {
                // Initial positioning spread out
                const angle = (idx / data.nodes.length) * Math.PI * 2;
                const r = 180 + Math.random() * 50;
                return {
                    id: n.id,
                    label: n.label,
                    group: n.group,
                    details: n.details,
                    x: canvas.width / 2 + Math.cos(angle) * r,
                    y: canvas.height / 2 + Math.sin(angle) * r,
                    vx: 0,
                    vy: 0,
                    radius: n.group === 0 ? 36 : n.group === 1 ? 30 : 26,
                    color: n.group === 0 ? "#6366f1" : n.group === 1 ? "#0ea5e9" : "#10b981",
                    glowColor: n.group === 0 ? "rgba(99, 102, 241, 0.4)" : n.group === 1 ? "rgba(14, 165, 233, 0.4)" : "rgba(16, 185, 129, 0.4)"
                };
            });

            // Instantiate links
            links = [];
            data.links.forEach(l => {
                const s = nodes.find(n => n.id === l.source);
                const t = nodes.find(n => n.id === l.target);
                if (s && t) {
                    links.push({ source: s, target: t });
                }
            });

            // Reset particles
            particles = [];
            if (document.getElementById("chk-particles").checked) {
                links.forEach(link => {
                    // Create 2 flow particles per link
                    for (let i = 0; i < 2; i++) {
                        particles.push({
                            link: link,
                            progress: Math.random(),
                            speed: 0.005 + Math.random() * 0.005
                        });
                    }
                });
            }
        }

        // Physics Update loop
        function updatePhysics() {
            const repulsionEnabled = document.getElementById("chk-repulsion").checked;
            const gravityEnabled = document.getElementById("chk-gravity").checked;
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;

            // 1. Repulsion between all node pairs
            if (repulsionEnabled) {
                for (let i = 0; i < nodes.length; i++) {
                    const n1 = nodes[i];
                    for (let j = i + 1; j < nodes.length; j++) {
                        const n2 = nodes[j];
                        const dx = n2.x - n1.x;
                        const dy = n2.y - n1.y;
                        const dist = Math.hypot(dx, dy) || 1;
                        if (dist < 320) {
                            // Inverse square law repulsion force
                            const force = (kRepulsion * kRepulsion) / (dist * dist);
                            const fx = (dx / dist) * force;
                            const fy = (dy / dist) * force;
                            
                            if (n1 !== draggedNode) {
                                n1.vx -= fx;
                                n1.vy -= fy;
                            }
                            if (n2 !== draggedNode) {
                                n2.vx += fx;
                                n2.vy += fy;
                            }
                        }
                    }
                }
            }

            // 2. Spring force along links
            links.forEach(link => {
                const s = link.source;
                const t = link.target;
                const dx = t.x - s.x;
                const dy = t.y - s.y;
                const dist = Math.hypot(dx, dy) || 1;
                
                const delta = dist - kRestingLength;
                const force = kSpring * delta;
                const fx = (dx / dist) * force;
                const fy = (dy / dist) * force;

                if (s !== draggedNode) {
                    s.vx += fx;
                    s.vy += fy;
                }
                if (t !== draggedNode) {
                    t.vx -= fx;
                    t.vy -= fy;
                }
            });

            // 3. Gravity pulling towards center
            if (gravityEnabled) {
                nodes.forEach(node => {
                    if (node === draggedNode) return;
                    node.vx += (cx - node.x) * kGravity;
                    node.vy += (cy - node.y) * kGravity;
                });
            }

            // 4. Update positions and velocities
            nodes.forEach(node => {
                if (node === draggedNode) {
                    node.x = mouseX;
                    node.y = mouseY;
                    node.vx = 0;
                    node.vy = 0;
                } else {
                    node.vx *= kDamping;
                    node.vy *= kDamping;
                    node.x += node.vx;
                    node.y += node.vy;

                    // Bound checks to keep inside viewport
                    const margin = 50;
                    if (node.x < margin) node.x = margin;
                    if (node.x > canvas.width - margin) node.x = canvas.width - margin;
                    if (node.y < margin) node.y = margin;
                    if (node.y > canvas.height - margin) node.y = canvas.height - margin;
                }
            });

            // 5. Update flow particles progress
            particles.forEach(p => {
                p.progress += p.speed;
                if (p.progress > 1) {
                    p.progress = 0;
                }
            });
        }

        // Draw everything
        function draw() {
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw clean grid dots backdrop
            ctx.fillStyle = isDarkTheme ? "rgba(255, 255, 255, 0.03)" : "rgba(0, 0, 0, 0.03)";
            const gridSize = 32;
            for (let x = 0; x < canvas.width; x += gridSize) {
                for (let y = 0; y < canvas.height; y += gridSize) {
                    ctx.beginPath();
                    ctx.arc(x, y, 1.2, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // 1. Draw link lines
            links.forEach(link => {
                const s = link.source;
                const t = link.target;
                
                // Highlight line if either source or target is hovered/selected
                const isHighlighted = (hoveredNode === s || hoveredNode === t || selectedNode === s || selectedNode === t);
                
                ctx.beginPath();
                ctx.moveTo(s.x, s.y);
                ctx.lineTo(t.x, t.y);
                ctx.strokeStyle = isHighlighted 
                    ? (isDarkTheme ? "#818cf8" : "#6366f1")
                    : (isDarkTheme ? "rgba(255,255,255,0.08)" : "rgba(0,0,0,0.06)");
                ctx.lineWidth = isHighlighted ? 3 : 1.5;
                ctx.stroke();
            });

            // 2. Draw flowing particles
            if (document.getElementById("chk-particles").checked) {
                particles.forEach(p => {
                    const s = p.link.source;
                    const t = p.link.target;
                    
                    // Linear interpolation
                    const px = s.x + (t.x - s.x) * p.progress;
                    const py = s.y + (t.y - s.y) * p.progress;

                    ctx.beginPath();
                    ctx.arc(px, py, 4, 0, Math.PI * 2);
                    ctx.fillStyle = isDarkTheme ? "#818cf8" : "#6366f1";
                    
                    // Particle glow glow
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = ctx.fillStyle;
                    ctx.fill();
                    ctx.shadowBlur = 0; // Reset
                });
            }

            // 3. Draw nodes
            nodes.forEach(node => {
                const isHovered = hoveredNode === node;
                const isSelected = selectedNode === node;

                // Glowing outer ring for selection or hover
                if (isHovered || isSelected) {
                    ctx.beginPath();
                    ctx.arc(node.x, node.y, node.radius + 6, 0, Math.PI * 2);
                    ctx.fillStyle = node.glowColor;
                    ctx.fill();
                }

                // Inner Circle Solid color
                ctx.beginPath();
                ctx.arc(node.x, node.y, node.radius, 0, Math.PI * 2);
                ctx.fillStyle = isSelected ? "#f59e0b" : node.color; // Selection gold
                ctx.shadowBlur = isHovered ? 12 : 0;
                ctx.shadowColor = node.color;
                ctx.fill();
                ctx.shadowBlur = 0; // Reset

                // Border ring
                ctx.beginPath();
                ctx.arc(node.x, node.y, node.radius, 0, Math.PI * 2);
                ctx.strokeStyle = isDarkTheme ? "#1e293b" : "#ffffff";
                ctx.lineWidth = 2.5;
                ctx.stroke();

                // Draw Text Label
                ctx.font = "bold 11px Inter, sans-serif";
                ctx.fillStyle = isDarkTheme ? "#f8fafc" : "#0f172a";
                ctx.textAlign = "center";
                ctx.textBaseline = "top";
                
                // Truncate label text if long
                let text = node.label;
                if (text.length > 14) text = text.slice(0, 12) + "...";
                ctx.fillText(text, node.x, node.y + node.radius + 6);

                // Draw Icon inside the circle
                ctx.font = "16px Tabler-Icons";
                ctx.fillStyle = "#ffffff";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                const icon = node.group === 0 ? "\ueb3f" : node.group === 1 ? "\uea4f" : "\ueb4e"; // video, compass, scissor
                ctx.fillText(icon, node.x, node.y);
            });
        }

        // Raycast-like node collision
        function getNodeAt(x, y) {
            for (let i = nodes.length - 1; i >= 0; i--) {
                const node = nodes[i];
                const dist = Math.hypot(node.x - x, node.y - y);
                if (dist <= node.radius + 8) {
                    return node;
                }
            }
            return null;
        }

        // Mouse handlers
        canvas.addEventListener("mousedown", (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            const clicked = getNodeAt(x, y);
            if (clicked) {
                draggedNode = clicked;
                selectNode(clicked);
            }
        });

        canvas.addEventListener("mousemove", (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;

            hoveredNode = getNodeAt(mouseX, mouseY);
            canvas.style.cursor = hoveredNode ? "pointer" : "default";
        });

        window.addEventListener("mouseup", () => {
            draggedNode = null;
        });

        function selectNode(node) {
            selectedNode = node;
            const data = node.details || {};

            // Populate right inspector details
            const inspectorBody = document.getElementById("inspector-details");
            let detailsHtml = `
                <div class="detail-item-group">
                    <div class="detail-lbl">節點識別 (ID)</div>
                    <div class="detail-val mono" style="color:var(--primary); font-weight:700;">${node.id}</div>
                </div>
                <div class="detail-item-group">
                    <div class="detail-lbl">資源名稱 / 描述</div>
                    <div class="detail-val" style="font-weight:700; font-size:14px;">${node.label}</div>
                </div>
                <div class="detail-item-group">
                    <div class="detail-lbl">分組層級 (Group)</div>
                    <div class="detail-val">
                        <span class="pill-badge">
                            ${node.group === 0 ? '原始素材資源' : node.group === 1 ? '影片結構需求' : 'Storyboard 分段結果'}
                        </span>
                    </div>
                </div>
            `;

            Object.keys(data).forEach(key => {
                const label = {
                    type: "媒體類型",
                    path: "實體路徑",
                    duration: "片段時長",
                    resolution: "解析度",
                    fps: "影格率",
                    description: "企劃指示",
                    status: "採用狀態",
                    asset: "對應資源",
                    target: "滿足需求",
                    warning: "警告資訊"
                }[key] || key;

                detailsHtml += `
                    <div class="detail-item-group">
                        <div class="detail-lbl">${label}</div>
                        <div class="detail-val ${key === 'path' || key === 'asset' || key === 'target' ? 'mono' : ''}" style="${key === 'warning' ? 'color:red; font-weight:700;' : ''}">${data[key]}</div>
                    </div>
                `;
            });

            inspectorBody.innerHTML = detailsHtml;
            document.getElementById("inspector-title").querySelector("span").textContent = node.id;
        }

        // Stabilize graph positions (spread them out neatly)
        document.getElementById("btn-stabilize-graph").addEventListener("click", () => {
            loadProject(activeProject);
        });

        // Theme toggle
        document.getElementById("theme-toggler").addEventListener("click", () => {
            isDarkTheme = !isDarkTheme;
            document.body.classList.toggle("dark-theme", isDarkTheme);
            document.getElementById("theme-toggler").textContent = isDarkTheme ? "☀️" : "🌙";
        });

        // Project selector
        document.getElementById("project-physics-select").addEventListener("change", (e) => {
            activeProject = e.target.value;
            loadProject(activeProject);
        });

        // Particle toggle
        document.getElementById("chk-particles").addEventListener("change", () => {
            loadProject(activeProject);
        });

        // Run Loop
        function run() {
            updatePhysics();
            draw();
            requestAnimationFrame(run);
        }

        // Startup
        loadProject(activeProject);
        run();
    </script>
</body>
</html>
